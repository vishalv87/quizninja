version: '3.8'

services:
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    image: quizninja-api:latest
    container_name: quizninja-api
    ports:
      - "8080:8080"
    env_file:
      - ./api/.env
    networks:
      - quizninja-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  quizninja-net:
    driver: bridge
